<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Página para solicitar a eliminação da conta ATNova e dos dados associados.">
  <meta name="theme-color" content="#0c302b">
  <title>Eliminar conta — ATNova</title>
  <style>
    :root {
      color-scheme: light;
      --background: #f2f7f5;
      --surface: #ffffff;
      --surface-soft: #eaf3f0;
      --ink: #17312d;
      --muted: #58706b;
      --brand: #0f5f54;
      --brand-dark: #0c302b;
      --accent: #d8a934;
      --border: #d5e3df;
      --shadow: 0 24px 65px rgba(12, 48, 43, 0.13);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 8% 0%, rgba(15, 95, 84, 0.16), transparent 30rem),
        radial-gradient(circle at 100% 100%, rgba(216, 169, 52, 0.12), transparent 25rem),
        linear-gradient(180deg, #f8fbfa 0%, var(--background) 100%);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.65;
    }

    a {
      color: inherit;
    }

    .page {
      width: min(1040px, calc(100% - 32px));
      margin-inline: auto;
      padding: 28px 0 48px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 28px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--brand-dark);
      font-weight: 850;
      letter-spacing: -0.02em;
    }

    .brand-mark {
      display: grid;
      width: 42px;
      height: 42px;
      place-items: center;
      border-radius: 13px;
      color: #ffffff;
      background: linear-gradient(135deg, var(--brand-dark), var(--brand));
      box-shadow: 0 9px 22px rgba(15, 95, 84, 0.22);
      font-size: 0.92rem;
    }

    .privacy-link {
      color: var(--brand);
      font-size: 0.92rem;
      font-weight: 750;
      text-decoration-thickness: 1.5px;
      text-underline-offset: 4px;
    }

    .card {
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: var(--shadow);
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: clamp(38px, 8vw, 76px);
      color: #ffffff;
      background: linear-gradient(135deg, #082b27 0%, #0f5f54 63%, #167466 100%);
